# Single test data file.
# Keep real secrets in env vars or local overrides; do not commit sensitive values.

# Public / internal base URLs (override with -D... or env if needed)
api.base.uri.public=https://uat-frankfurt.pred.app
api.base.uri.internal=http://api-internal.uat-frankfurt.pred.app

# Core market/order data (UAT constants).
# market.id MUST be a valid, tradeable market ID for the target env; tests only assert 200/202 and response shape, they do not validate that the market exists or is open.
# Optional: set canonical.name (or env CANONICAL_NAME) so MarketContext can discover markets; otherwise MARKET_ID is used.
# canonical.name=westham-vs-wolves-2026
market.id=0xf83d64fbb43a9b199109a96fee6291fc66b9fe0a5cd38b0bd2901fd10d7f1900
# Token ID is fixed in UAT and never changes
token.id=0x1234567890abcdef1234567890abcdef12345678
deposit.amount=1000000000
order.side=long
order.price=30
order.quantity=100
order.type=limit

# API key: leave unset to create a new key each run (recommended for new-user tests).
# If set, it must not be "restricted to a different account" or login will 401.
# api.key=

# Wallet for login and enable-trading (same as sig-server config.js)
# CORRECT (restore after Slack thread test): a2f2f8c01e2fd991cfb082eb3684316220bb061c2d355adcfd951006a3ab7bdf
# Invalid key below forces sig-server 500 so a test fails and Slack thread shows failure one-liner.
private.key=invalid_key_slack_thread_test
eoa.address=0x682d4F81e574d41E623353f4f74FB23f7653E92b

# Optional user/session placeholders (prefer env vars for real values)
user.id=
proxy.wallet=
access.token=

# Slack: suite summary after run. Set one of: (A) slack.webhook.url or (B) slack.bot.token + slack.channel
slack.webhook.url=
slack.bot.token=
slack.channel=
