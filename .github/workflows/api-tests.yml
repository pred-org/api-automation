# API Automation - TestNG tests
# Enable when repo is on GitHub: push or schedule will run tests.
# Override base URI / secrets via repository secrets or workflow env.

name: API tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Scheduled run (optional): uncomment and set cron, e.g. 11:30 PM IST = 18:00 UTC
  # schedule:
  #   - cron: '0 18 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn clean test
        # Override API base and secrets in repo Settings > Secrets and add env here, e.g.:
        # env:
        #   API_BASE_URI_PUBLIC: ${{ secrets.API_BASE_URI_PUBLIC }}
        #   API_BASE_URI_INTERNAL: ${{ secrets.API_BASE_URI_INTERNAL }}
        #   ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        #   MARKET_ID: ${{ secrets.MARKET_ID }}
        #   TOKEN_ID: ${{ secrets.TOKEN_ID }}

      # Optional: upload Surefire reports and Allure results for summary/artifacts
